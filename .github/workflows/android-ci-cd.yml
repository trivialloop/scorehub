name: "Android CI/CD"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "Decode keystore"
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.SIGNING_KEYSTORE_FILE_BASE64 }}" | base64 --decode > app/${{ secrets.SIGNING_STORE_FILE_PATH }}

      - name: "Run unit tests"
        env:
          SIGNING_STORE_FILE_PATH: ${{ secrets.SIGNING_STORE_FILE_PATH }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew testFossDebugUnitTest

      - name: "Upload unit test reports"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

      - name: "Run lint"
        env:
          SIGNING_STORE_FILE_PATH: ${{ secrets.SIGNING_STORE_FILE_PATH }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew lintFossDebug

      - name: "Upload lint reports"
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lint-reports
          path: app/build/reports/lint-results-debug.html

  build:
    name: "Build APK"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v6

      - name: "Decode keystore"
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.SIGNING_KEYSTORE_FILE_BASE64 }}" | base64 --decode > app/${{ secrets.SIGNING_STORE_FILE_PATH }}

      - name: "Build debug APK"
        env:
          SIGNING_STORE_FILE_PATH: ${{ secrets.SIGNING_STORE_FILE_PATH }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleDebug --stacktrace

      - name: "Upload debug APK"
        uses: actions/upload-artifact@v7
        with:
          name: app-debug
          path: |
            app/build/outputs/apk/foss/debug/*.apk
            app/build/outputs/apk/foss/debug/*.json

      - name: "Build release APK"
        if: github.ref == 'refs/heads/main'
        env:
          SIGNING_STORE_FILE_PATH: ${{ secrets.SIGNING_STORE_FILE_PATH }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: "Upload release APK"
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: app-release
          path: |
            app/build/outputs/apk/foss/release/*.apk
            app/build/outputs/apk/foss/release/*.json

  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Set up JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: "Download Artifacts"
        uses: actions/download-artifact@v8
        with:
          name: app-release
          path: artifacts

      - name: "Get Version Name"
        id: get_version
        run: |
          # Install jq if not present
          if ! command -v jq &> /dev/null; then
            apt-get update
            apt-get install -y jq
          fi
          VERSION_CODE=$(jq -r '.elements[0].versionCode' "artifacts/output-metadata.json")
          VERSION_NAME=$(jq -r '.elements[0].versionName' "artifacts/output-metadata.json")
          echo "version_code=${VERSION_CODE}" >> ${GITHUB_OUTPUT}
          echo "version_name=v${VERSION_NAME}" >> ${GITHUB_OUTPUT}

      - name: "Decide whether to release"
        id: check
        env:
          VERSION_CODE: ${{ steps.get_version.outputs.version_code }}
          VERSION_NAME: ${{ steps.get_version.outputs.version_name }}
          REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          should_release=true
          reasons=()

          # 1) Check release doesn't already exist
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/${REPO}/releases/tags/${VERSION_NAME}")
          if [ "$HTTP_STATUS" = "200" ]; then
            should_release=false
            reasons+=("Release tag ${VERSION_NAME} already exists (GitHub release).")
          fi

          # 2) Check fastlane/en-US changelog exists
          EN_US_PATH="fastlane/metadata/android/en-US/changelogs/${VERSION_CODE}.txt"
          if [ ! -f "${EN_US_PATH}" ]; then
            should_release=false
            reasons+=("${EN_US_PATH} not found.")
          fi

          # 3) Check fastlane/fr-FR changelog exists
          FR_FR_PATH="fastlane/metadata/android/fr-FR/changelogs/${VERSION_CODE}.txt"
          if [ ! -f "${FR_FR_PATH}" ]; then
            should_release=false
            reasons+=("${FR_FR_PATH} not found.")
          fi

          # 4) Check CHANGELOG.md contains heading "## [VERSION_NAME]"
          if ! grep -qE "^## \\[${VERSION_NAME#v}\\]" CHANGELOG.md; then
            should_release=false
            reasons+=("CHANGELOG.md does not contain heading '## [${VERSION_NAME}]'.")
          fi

          # Emit outputs
          echo "should_release=${should_release}" >> $GITHUB_OUTPUT
          message=$(printf "%s\n" "${reasons[@]}")
          echo "reason=${message}" >> $GITHUB_OUTPUT

      - name: "Log release decision"
        if: always()
        run: |
          echo "Should release: ${{ steps.check.outputs.should_release }}"
          echo "Reason(s):"
          echo "${{ steps.check.outputs.reason }}"

      - name: "Create GitHub Release"
        if: ${{ steps.check.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.version_name }}
          body_path: fastlane/metadata/android/en-US/changelogs/${{ steps.get_version.outputs.version_code }}.txt
          files: |
            artifacts/*.apk
          token: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          generate_release_notes: true
          prerelease: false
